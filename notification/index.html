<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Placeholder</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Roboto", Arial, sans-serif;
            color: #fff;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0b0b0b;
            cursor: default;
        }

        /* Mimic YouTube's play button */
        .play-button {
            width: 68px;
            height: 48px;
            background-color: rgba(170, 170, 170, 0.4);
            border-radius: 12% / 12%;
            position: relative;
            margin-bottom: 20px;
        }

        .play-button::after {
            content: "";
            position: absolute;
            left: 55%;
            top: 50%;
            transform: translate(-50%, -50%);
            border-style: solid;
            border-width: 12px 0 12px 20px;
            border-color: transparent transparent transparent #fff;
        }

        .message {
            font-size: 1.2rem;
            text-align: center;
            max-width: 80%;
            line-height: 1.5;
            color: #aaa;
            font-weight: 400;
        }

        @media (max-width: 480px) {
            .message {
                font-size: 1rem;
            }
            .play-button {
                width: 50px;
                height: 35px;
            }
            .play-button::after {
                border-width: 10px 0 10px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="video-container">
        <div class="play-button"></div>
        <div class="message">
            video will be displayed soon before deadline is reached
        </div>
    </div>
</body>
</html>
